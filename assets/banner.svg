<svg width="960" height="220" viewBox="0 0 960 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0d0d1f"/>
      <stop offset="100%" stop-color="#130d2a"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#818cf8"/>
      <stop offset="50%"  stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#818cf8" stop-opacity="0"/>
      <stop offset="40%"  stop-color="#a78bfa" stop-opacity="1"/>
      <stop offset="60%"  stop-color="#38bdf8" stop-opacity="1"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#7c3aed" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="960" height="220" rx="14" fill="url(#bg)"/>

  <!-- Subtle center glow -->
  <ellipse cx="480" cy="110" rx="380" ry="120" fill="url(#centerGlow)">
    <animate attributeName="rx" values="380;420;380" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="ry" values="120;140;120" dur="6s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Animated background grid dots -->
  <g opacity="0.18">
    <!-- Row 1 -->
    <circle cx="80"  cy="40"  r="1.5" fill="#818cf8"><animate attributeName="opacity" values="0.3;1;0.3" dur="3.1s" begin="0s"    repeatCount="indefinite"/></circle>
    <circle cx="200" cy="25"  r="1"   fill="#38bdf8"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.7s" begin="0.5s"  repeatCount="indefinite"/></circle>
    <circle cx="320" cy="45"  r="1.5" fill="#a78bfa"><animate attributeName="opacity" values="0.3;1;0.3" dur="3.5s" begin="1s"    repeatCount="indefinite"/></circle>
    <circle cx="640" cy="30"  r="1"   fill="#818cf8"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.9s" begin="0.3s"  repeatCount="indefinite"/></circle>
    <circle cx="760" cy="50"  r="1.5" fill="#38bdf8"><animate attributeName="opacity" values="0.3;1;0.3" dur="3.3s" begin="0.8s"  repeatCount="indefinite"/></circle>
    <circle cx="880" cy="35"  r="1"   fill="#a78bfa"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.5s" begin="1.4s"  repeatCount="indefinite"/></circle>
    <!-- Row 2 -->
    <circle cx="40"  cy="110" r="1"   fill="#38bdf8"><animate attributeName="opacity" values="0.3;1;0.3" dur="3.7s" begin="0.6s"  repeatCount="indefinite"/></circle>
    <circle cx="140" cy="130" r="1.5" fill="#818cf8"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.8s" begin="1.2s"  repeatCount="indefinite"/></circle>
    <circle cx="820" cy="115" r="1.5" fill="#a78bfa"><animate attributeName="opacity" values="0.3;1;0.3" dur="3.2s" begin="0.4s"  repeatCount="indefinite"/></circle>
    <circle cx="920" cy="100" r="1"   fill="#818cf8"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.6s" begin="1.1s"  repeatCount="indefinite"/></circle>
    <!-- Row 3 -->
    <circle cx="100" cy="185" r="1.5" fill="#a78bfa"><animate attributeName="opacity" values="0.3;1;0.3" dur="3.4s" begin="0.9s"  repeatCount="indefinite"/></circle>
    <circle cx="240" cy="195" r="1"   fill="#38bdf8"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.9s" begin="0.2s"  repeatCount="indefinite"/></circle>
    <circle cx="700" cy="190" r="1"   fill="#818cf8"><animate attributeName="opacity" values="0.3;1;0.3" dur="3.6s" begin="0.7s"  repeatCount="indefinite"/></circle>
    <circle cx="840" cy="180" r="1.5" fill="#38bdf8"><animate attributeName="opacity" values="0.3;1;0.3" dur="3.0s" begin="1.5s"  repeatCount="indefinite"/></circle>
    <circle cx="950" cy="200" r="1"   fill="#a78bfa"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.4s" begin="0.1s"  repeatCount="indefinite"/></circle>
  </g>

  <!-- Clock icon (animated sweep hand) -->
  <g transform="translate(480,76)" filter="url(#glow)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="26" fill="none" stroke="url(#titleGrad)" stroke-width="2" opacity="0.9"/>
    <!-- Inner fill -->
    <circle cx="0" cy="0" r="24" fill="#0d0d1f" opacity="0.7"/>
    <!-- Tick marks -->
    <line x1="0"  y1="-20" x2="0"  y2="-16" stroke="#818cf8" stroke-width="1.5" opacity="0.8"/>
    <line x1="20" y1="0"   x2="16" y2="0"   stroke="#818cf8" stroke-width="1.5" opacity="0.8"/>
    <line x1="0"  y1="20"  x2="0"  y2="16"  stroke="#818cf8" stroke-width="1.5" opacity="0.8"/>
    <line x1="-20" y1="0"  x2="-16" y2="0"  stroke="#818cf8" stroke-width="1.5" opacity="0.8"/>
    <!-- Hour hand -->
    <line x1="0" y1="0" x2="0" y2="-12" stroke="#a78bfa" stroke-width="2.5" stroke-linecap="round">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="12s" repeatCount="indefinite"/>
    </line>
    <!-- Minute hand -->
    <line x1="0" y1="0" x2="0" y2="-18" stroke="#38bdf8" stroke-width="1.5" stroke-linecap="round">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="2s" repeatCount="indefinite"/>
    </line>
    <!-- Center dot -->
    <circle cx="0" cy="0" r="2.5" fill="#e2e8f0"/>
    <!-- Outer ring pulse -->
    <circle cx="0" cy="0" r="26" fill="none" stroke="#818cf8" stroke-width="1" opacity="0">
      <animate attributeName="r"       values="26;36;26"   dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0;0.5" dur="3s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Title -->
  <text x="480" y="128"
        font-family="'Segoe UI', 'SF Pro Display', system-ui, -apple-system, sans-serif"
        font-size="42" font-weight="700" letter-spacing="1"
        fill="url(#titleGrad)" text-anchor="middle" filter="url(#softglow)">
    CronSentinel
    <animate attributeName="opacity" values="0;0;1" dur="1.2s" fill="freeze"/>
  </text>

  <!-- Subtitle -->
  <text x="480" y="157"
        font-family="'Segoe UI', 'SF Pro Display', system-ui, -apple-system, sans-serif"
        font-size="15" fill="#94a3b8" text-anchor="middle" letter-spacing="0.5">
    Self-hosted cron job manager · real-time logs · system monitoring
    <animate attributeName="opacity" values="0;0;0;1" dur="2s" fill="freeze"/>
  </text>

  <!-- Animated underline -->
  <line x1="480" y1="170" x2="480" y2="170" stroke="url(#lineGrad)" stroke-width="1.5" stroke-linecap="round">
    <animate attributeName="x1" values="480;240" dur="1s" begin="0.8s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
    <animate attributeName="x2" values="480;720" dur="1s" begin="0.8s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
  </line>

  <!-- Bottom tag pills -->
  <g>
    <!-- Go -->
    <rect x="305" y="183" width="46" height="22" rx="11" fill="#0d9488" opacity="0.22"/>
    <text x="328" y="198" font-family="system-ui" font-size="11" fill="#2dd4bf" text-anchor="middle" font-weight="600">Go</text>
    <!-- React -->
    <rect x="361" y="183" width="54" height="22" rx="11" fill="#0ea5e9" opacity="0.22"/>
    <text x="388" y="198" font-family="system-ui" font-size="11" fill="#38bdf8" text-anchor="middle" font-weight="600">React</text>
    <!-- Postgres -->
    <rect x="425" y="183" width="76" height="22" rx="11" fill="#6366f1" opacity="0.22"/>
    <text x="463" y="198" font-family="system-ui" font-size="11" fill="#818cf8" text-anchor="middle" font-weight="600">PostgreSQL</text>
    <!-- Docker -->
    <rect x="511" y="183" width="60" height="22" rx="11" fill="#0284c7" opacity="0.22"/>
    <text x="541" y="198" font-family="system-ui" font-size="11" fill="#7dd3fc" text-anchor="middle" font-weight="600">Docker</text>
    <!-- SSE -->
    <rect x="581" y="183" width="72" height="22" rx="11" fill="#d946ef" opacity="0.22"/>
    <text x="617" y="198" font-family="system-ui" font-size="11" fill="#e879f9" text-anchor="middle" font-weight="600">Live&nbsp;Logs</text>

    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="1.8s" fill="freeze"/>
  </g>

  <!-- Border glow -->
  <rect width="960" height="220" rx="14" fill="none" stroke="url(#titleGrad)" stroke-width="1" opacity="0.35"/>
</svg>
